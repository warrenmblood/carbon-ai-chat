# Publish the staging / latest / versioned CDN artifacts to Cloud Object Storage
name: Publish ai-chat CDN artifacts

# This workflow is triggered from the `create-release-tag-and-pr` workflow when a new tag is created
# Or can be manually triggered with tag provided
on:
  workflow_dispatch:
    inputs:
      tag:
        # Recently published version
        required: true
        description: "release tag (ie. v1.1.0-rc.0 or v1.1.0)"
        type: string
        default: "v1.1.0-rc.0"
  repository_dispatch:
    types: [publish-cdn-artifacts]

jobs:
  publish-cdn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: "0"
          ref: ${{ github.event.client_payload.branch }}
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - name: Install dependencies
        run: |
          npm ci --prefer-offline
          npm run build
      - name: Check release type
        if: contains(github.event.client_payload.tag, '-rc.') || contains(github.event.inputs.tag, '-rc.')
        run: echo "PRE_RELEASE=true" >> $GITHUB_ENV
      - name: Get version of web components from package.json
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
        with:
          path: packages/ai-chat

      # If tag is a release candidate, upload the CDN artifacts to the `next` tag folder
      # ie. chat.carbondesignsystem.com/tag/next/docs/index.html
      - name: Upload typedoc to COS under the `next` folder
        if: ${{ env.PRE_RELEASE }}
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.COMMON_COS_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.COMMON_COS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.COMMON_COS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.COMMON_COS_REGION }}
          AWS_S3_ENDPOINT: https://${{ secrets.COMMON_COS_ENDPOINT }}
          SOURCE_DIR: "packages/ai-chat/dist/docs/carbon-tsdocs"
          DEST_DIR: "tag/next/docs"

      # If tag is a full release, upload the CDN artifacts to the `latest` tag folder
      # ie. chat.carbondesignsystem.com/tag/latest/docs/index.html
      - name: Upload typedoc to COS under the `latest` folder
        if: ${{ !env.PRE_RELEASE }}
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.COMMON_COS_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.COMMON_COS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.COMMON_COS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.COMMON_COS_REGION }}
          AWS_S3_ENDPOINT: https://${{ secrets.COMMON_COS_ENDPOINT }}
          SOURCE_DIR: "packages/ai-chat/dist/docs/carbon-tsdocs"
          DEST_DIR: "tag/latest/docs"

      # Upload the CDN artifacts to versioned folder
      # ie. chat.carbondesignsystem.com/version/v.1.0.0/docs/index.html
      - name: Upload typedoc to COS under the versioned folder
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.COMMON_COS_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.COMMON_COS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.COMMON_COS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.COMMON_COS_REGION }}
          AWS_S3_ENDPOINT: https://${{ secrets.COMMON_COS_ENDPOINT }}
          SOURCE_DIR: "packages/ai-chat/dist/docs/carbon-tsdocs"
          DEST_DIR: "version/v${{steps.package-version.outputs.current-version}}/docs"

      # If tag is a release candidate, upload the CDN artifacts to the `next` tag folder
      # ie. chat.carbondesignsystem.com/tag/next/demo/index.html
      - name: Upload demo to COS under the `next` folder
        if: ${{ env.PRE_RELEASE }}
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.COMMON_COS_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.COMMON_COS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.COMMON_COS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.COMMON_COS_REGION }}
          AWS_S3_ENDPOINT: https://${{ secrets.COMMON_COS_ENDPOINT }}
          SOURCE_DIR: "demo/dist"
          DEST_DIR: "tag/next/demo"

      # If tag is a full release, upload the CDN artifacts to the `latest` tag folder
      # ie. chat.carbondesignsystem.com/tag/latest/demo/index.html
      - name: Upload demo to COS under the `latest` folder
        if: ${{ !env.PRE_RELEASE }}
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.COMMON_COS_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.COMMON_COS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.COMMON_COS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.COMMON_COS_REGION }}
          AWS_S3_ENDPOINT: https://${{ secrets.COMMON_COS_ENDPOINT }}
          SOURCE_DIR: "demo/dist"
          DEST_DIR: "tag/latest/demo"

      # Upload the CDN artifacts to versioned folder
      # ie. chat.carbondesignsystem.com/version/v1.x.0/demo/index.html
      - name: Upload demo to COS under the versioned folder
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks
        env:
          AWS_S3_BUCKET: ${{ secrets.COMMON_COS_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.COMMON_COS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.COMMON_COS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.COMMON_COS_REGION }}
          AWS_S3_ENDPOINT: https://${{ secrets.COMMON_COS_ENDPOINT }}
          SOURCE_DIR: "demo/dist"
          DEST_DIR: "version/v${{steps.package-version.outputs.current-version}}/demo"

